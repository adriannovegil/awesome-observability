name: Lint

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize]
  schedule:
    # Run weekly on Mondays at 9:00 UTC to detect link rot early
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link_check:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --timeout 120
            --max-retries 3
            --accept 100..=399,403,429
            README.md
          fail: true

  awesome_lint:
    name: Run awesome linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npx awesome-lint
